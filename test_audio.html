<!DOCTYPE html>
<html>
<head><title>Audio CORS Test</title><style>body{font-family:monospace;padding:20px} #log{white-space:pre-wrap;background:#1a1a2e;color:#0f0;padding:15px;border-radius:8px;max-height:80vh;overflow-y:auto}</style></head>
<body>
<h2>CORS 音频测试</h2>
<button onclick="runTests()">运行所有测试</button>
<div id="log"></div>
<script>
const log = document.getElementById('log');
function addLog(msg) { log.textContent += msg + '\n'; log.scrollTop = log.scrollHeight; }

async function runTests() {
    log.textContent = '';
    addLog('=== CORS 音频播放测试 ===\n');
    
    // Test 1: API list
    addLog('[1] 测试 API: sgbList...');
    try {
        const r = await fetch('https://api.top237.top/ry-api/start/zanmei/sgbList');
        const j = await r.json();
        addLog('  ✅ sgbList 成功, total=' + j.total + ', rows=' + j.rows.length);
        
        const songs = j.rows.filter(s => s.shiji_index === 0 && s.isad);
        const song = songs[0];
        addLog('  选歌曲: ' + song.title + ' (id=' + song.id.substring(0,8) + '...)');
        
        // Test 2: API detail
        addLog('\n[2] 测试 API: searchByIdsLazyField...');
        const r2 = await fetch('https://api.top237.top/ry-api/start/zanmei/searchByIdsLazyField?ids=' + song.id + '&fields=lyric,lrc,adUrl,gepuUrl');
        const j2 = await r2.json();
        const adUrl = j2.data[0].adUrl;
        const lyric = j2.data[0].lyric;
        addLog('  ✅ detail 成功');
        addLog('  adUrl: ' + adUrl);
        addLog('  lyric length: ' + (lyric ? lyric.length : 0));
        
        // Test 3: Audio without crossOrigin
        addLog('\n[3] 测试 Audio (crossOrigin=null)...');
        const audio1 = new Audio();
        audio1.crossOrigin = null;
        audio1.src = adUrl;
        const p1 = new Promise((resolve, reject) => {
            audio1.addEventListener('canplay', () => resolve('✅ canplay'));
            audio1.addEventListener('error', () => reject('❌ error: ' + (audio1.error ? audio1.error.message + ' code=' + audio1.error.code : 'unknown')));
            setTimeout(() => reject('⏰ 15s timeout'), 15000);
        });
        try {
            addLog('  ' + await p1);
        } catch(e) { addLog('  ' + e); }
        
        // Test 4: Audio play
        addLog('\n[4] 测试 audio.play()...');
        try {
            await audio1.play();
            addLog('  ✅ play() 成功!');
            setTimeout(() => { audio1.pause(); addLog('  (3秒后自动暂停)'); }, 3000);
        } catch(e) {
            addLog('  ❌ play() 失败: ' + e.message);
        }
        
        // Test 5: Audio element in DOM
        addLog('\n[5] 测试 <audio> DOM element...');
        const audioEl = document.createElement('audio');
        audioEl.controls = true;
        audioEl.src = adUrl;
        document.body.appendChild(audioEl);
        addLog('  <audio> 已添加到页面（手动测试播放）');
        
    } catch(e) {
        addLog('  ❌ 错误: ' + e.message);
    }
}
</script>
</body>
</html>
