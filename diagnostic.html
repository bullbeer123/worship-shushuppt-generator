<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>音频诊断</title>
<style>
body{font-family:monospace;padding:20px;max-width:600px;margin:0 auto}
button{padding:10px 20px;margin:5px;font-size:16px;cursor:pointer;border:none;border-radius:8px;background:#5B1A6E;color:white}
#log{white-space:pre-wrap;background:#111;color:#0f0;padding:15px;border-radius:8px;max-height:60vh;overflow-y:auto;margin-top:15px;font-size:14px}
.pass{color:#0f0}.fail{color:#f44}.warn{color:#fa0}
</style>
</head>
<body>
<h2>🎙️ 音频播放诊断 v2</h2>
<p>测试 CORS 代理 + blob URL 方案</p>
<button onclick="runAll()">▶ 运行诊断</button>
<div id="log"></div>
<script>
const log = document.getElementById('log');
function add(msg, cls='') { log.innerHTML += `<span class="${cls}">${msg}</span>\n`; log.scrollTop = log.scrollHeight; }

async function runAll() {
    log.textContent = '';
    const SONG_API = 'https://api.top237.top/ry-api';
    const CORS_PROXY = 'https://api.codetabs.com/v1/proxy?quest=';

    // Step 1: Get audio URL from API
    add('━━━ 步骤1: 获取音频 URL ━━━');
    let adUrl, song;
    try {
        const list = (await (await fetch(SONG_API + '/start/zanmei/sgbList')).json()).rows;
        song = list.filter(s => s.shiji_index === 0 && s.isad)[0];
        add('  歌曲: ' + song.title);
        const j = await (await fetch(SONG_API + '/start/zanmei/searchByIdsLazyField?ids=' + song.id + '&fields=adUrl')).json();
        adUrl = j.data[0].adUrl;
        add('  URL: ' + adUrl);
    } catch(e) { add('  ❌ ' + e.message, 'fail'); return; }

    // Step 2: Direct Audio (old method - may fail on iOS)
    add('\n━━━ 步骤2: 直接 Audio URL（旧方法）━━━');
    add('  Content-Type from oss.top237.top: application/octet-stream');
    add('  iOS Safari 通常拒绝播放 octet-stream 类型');
    const audio1 = new Audio();
    const r2 = await new Promise(resolve => {
        let done = false;
        const t = setTimeout(() => { if(!done){done=true; resolve('⏰ 10s超时');} }, 10000);
        audio1.addEventListener('canplay', () => { if(!done){done=true;clearTimeout(t); resolve('✅ canplay');} });
        audio1.addEventListener('error', () => { if(!done){done=true;clearTimeout(t); resolve('❌ error: code='+audio1.error?.code);} });
        audio1.src = adUrl;
    });
    add('  结果: ' + r2, r2.startsWith('✅') ? 'pass' : 'fail');
    audio1.pause(); audio1.src = '';

    // Step 3: CORS Proxy + blob (new method)
    add('\n━━━ 步骤3: CORS代理下载 → blob URL（新方法）━━━');
    try {
        add('  正在通过 codetabs.com 代理下载...');
        const proxyUrl = CORS_PROXY + encodeURIComponent(adUrl);
        add('  代理URL: ' + proxyUrl.substring(0, 70) + '...');
        const resp = await fetch(proxyUrl);
        add('  fetch status: ' + resp.status);
        if (!resp.ok) throw new Error('proxy failed');
        const blob = await resp.blob();
        add('  blob size: ' + (blob.size / 1024 / 1024).toFixed(1) + ' MB, type: ' + blob.type);

        const audioBlob = new Blob([blob], { type: 'audio/mpeg' });
        const blobUrl = URL.createObjectURL(audioBlob);
        add('  blob URL: ' + blobUrl.substring(0, 40) + '...');

        // Step 4: Play blob URL
        add('\n━━━ 步骤4: 播放 blob URL ━━━');
        const audio2 = new Audio();
        const r4 = await new Promise(resolve => {
            let done = false;
            const t = setTimeout(() => { if(!done){done=true; resolve('⏰ 10s超时');} }, 10000);
            audio2.addEventListener('canplaythrough', () => { if(!done){done=true;clearTimeout(t); resolve('✅ 可播放! duration=' + audio2.duration.toFixed(1) + 's');} });
            audio2.addEventListener('error', () => { if(!done){done=true;clearTimeout(t); resolve('❌ error: code='+audio2.error?.code);} });
            audio2.src = blobUrl;
        });
        add('  结果: ' + r4, r4.startsWith('✅') ? 'pass' : 'fail');

        // Try actual play
        add('\n━━━ 步骤5: 实际播放测试 ━━━');
        try {
            audio2.volume = 0.3;
            await audio2.play();
            add('  ✅ 播放成功! 3秒后自动暂停');
            setTimeout(() => { audio2.pause(); audio2.currentTime = 0; }, 3000);
        } catch(e) {
            add('  ❌ play() 失败: ' + e.message, 'fail');
        }
        URL.revokeObjectURL(blobUrl);

    } catch(e) {
        add('  ❌ 代理下载失败: ' + e.message, 'fail');
    }

    add('\n━━━ 诊断完成 ━━━', 'pass');
}
</script>
</body>
</html>
